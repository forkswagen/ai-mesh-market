# Railway: Settings → Root Directory = server (обязательно для монорепо).
# Builder: только RAILPACK или DOCKERFILE (nixpacks больше не поддерживается в config).
# https://docs.railway.app/reference/config-as-code

[build]
builder = "RAILPACK"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
